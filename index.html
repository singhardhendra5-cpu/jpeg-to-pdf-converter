<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPEG to PDF Converter</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h1>JPEG to PDF Converter</h1>
            </div>
            <div class="card-body">
                <p class="text-center">Select a JPEG file to convert to PDF.</p>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="jpegFile" accept="image/jpeg">
                    <label class="custom-file-label" for="jpegFile">Choose file</label>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-primary" id="convertBtn" disabled>Convert to PDF</button>
                </div>
                <div class="text-center mt-3" id="downloadLinkContainer" style="display: none;">
                    <a href="#" id="downloadLink" class="btn btn-success">Download PDF</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.3.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
